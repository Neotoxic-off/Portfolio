services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neo-portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GITHUB_USER=${GITHUB_USER:-Neotoxic-off}
      # Optional: raises GitHub API rate limit (60/h -> 5000/h)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
